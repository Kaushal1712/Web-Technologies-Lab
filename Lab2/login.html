<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DY Patil Institute Of Technology | Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="brand">
      <img src="DPU_Logo.png" class="brand-logo" alt="DY Patil Institute logo">
      <h1>DY Patil Institute Of Technology</h1>
    </div>
  </header>

  <nav aria-label="Primary navigation">
    <ul class="nav-list">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="product.html">Departments</a></li>
      <li><a href="contact_us.html">Contact Us</a></li>
      <li><a href="new_registration.html">New Registration</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>

  <main>
    <section class="login-box">
      <h2>Student Login</h2>

      <form action="#" method="post">
        <div class="input-group">
          <label for="email">Email ID</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>

        <div class="extra-options">
          <label>
            <input type="checkbox" name="remember"> Remember Me
          </label>
          <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">Login</button>
      </form>

      <p class="register-link">
        Don't have an account? <a href="new_registration.html">Register Here</a>
      </p>
    </section>
  </main>

  <footer>
    DY Patil Institute Of Technology | Shardul Raskar TCOB07
  </footer>
</body>
</html>
